name: ERP Frontend CI/CD

on:
  push:
    branches:
      - dev      # Auto deploy ke development
      - main     # Auto deploy ke production
  pull_request:
    branches:
      - main     # Run checks je, tak deploy

jobs:
  # ================================
  # JOB 1 — Lint & Build Check
  # ================================
  build-check:
    name: Lint & Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Run ESLint
        run: npm run lint

      - name: Build check
        run: npm run build
        env:
          VITE_API_BASE_URL: https://erp-backend.up.railway.app/api/v1

  # ================================
  # JOB 2 — Deploy Staging (dev branch)
  # ================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-check
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway (Development)
        run: railway up --service erp-frontend-development --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
          VITE_API_BASE_URL: ${{ secrets.STAGING_API_URL }}

      - name: Notify deploy success
        run: echo "✅ ERP Frontend deployed to DEVELOPMENT successfully!"

  # ================================
  # JOB 3 — Deploy Production (main branch)
  # ================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway (Production)
        run: railway up --service erp-frontend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
          VITE_API_BASE_URL: ${{ secrets.PRODUCTION_API_URL }}

      - name: Notify deploy success
        run: echo "🚀 ERP Frontend deployed to PRODUCTION successfully!"
